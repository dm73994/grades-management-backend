spring:
  application:
    name: notes


  datasource:
    url: ${DB_URI}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 7399

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger